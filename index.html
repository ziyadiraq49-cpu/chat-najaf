<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>محادثات عسل در النجف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d1117;--sur:#161b22;--sur2:#21262d;--bdr:#30363d;--txt:#e6edf3;--mute:#8b949e;--dim:#484f58;--blue:#58a6ff;--grn:#3fb950;--red:#f85149}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:"Cairo",sans-serif}
body{display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.page{display:none;flex-direction:column;min-height:100vh}
.page.vis{display:flex}

/* ── AUTH ── */
#pg-auth{align-items:center;justify-content:center;padding:24px}
.abox{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:28px 22px;width:100%;max-width:380px}
.alogo{text-align:center;margin-bottom:22px}
.alogo .ico{font-size:44px;display:block;margin-bottom:8px}
.alogo .tit{font-size:17px;font-weight:900;color:var(--blue)}
.atabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:3px;margin-bottom:18px}
.atb{flex:1;padding:8px;border:none;background:transparent;color:var(--mute);font-family:"Cairo",sans-serif;font-size:13px;font-weight:700;border-radius:7px;cursor:pointer;transition:all .2s}
.atb.on{background:var(--blue);color:white}
.fg{display:none;flex-direction:column;gap:12px}
.fg.vis{display:flex}
.lbl{font-size:11px;color:var(--mute);font-weight:600;margin-bottom:4px;display:block}
.finp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:9px;padding:11px 13px;outline:none;font-size:15px;-webkit-appearance:none;transition:border-color .2s}
.finp:focus{border-color:var(--blue)}
.finp::placeholder{color:var(--dim)}
.ferr{font-size:12px;color:var(--red);padding:9px 12px;background:#1a0505;border-radius:8px;display:none;margin-top:-4px}
.fbtn{width:100%;background:var(--blue);border:none;color:white;font-family:"Cairo",sans-serif;font-weight:900;font-size:15px;cursor:pointer;padding:13px;border-radius:10px;transition:opacity .2s}
.fbtn:disabled{opacity:.5}

/* ── CONV LIST ── */
#pg-list{flex-direction:column;min-height:100vh}
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 16px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-r{display:flex;gap:6px}
.av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:white;flex-shrink:0;cursor:pointer;border:none;font-family:"Cairo",sans-serif}
.htitle{font-size:15px;font-weight:900}
.ibtn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:22px;padding:6px;border-radius:8px;line-height:1}
.clist{flex:1}
.citem{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid rgba(48,54,61,.4);transition:background .1s}
.citem:active{background:var(--sur2)}
.cav{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:white;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cname{font-size:14px;font-weight:700;margin-bottom:4px}
.clast{font-size:12px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctime{font-size:11px;color:var(--dim);flex-shrink:0}
.fab{position:fixed;bottom:24px;left:20px;width:54px;height:54px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(88,166,255,.4);display:flex;align-items:center;justify-content:center;z-index:20;font-family:"Cairo",sans-serif}
.empty{padding:48px 20px;text-align:center;color:var(--mute)}
.empty .ei{font-size:52px;margin-bottom:14px}

/* ── CHAT ROOM ── */
#pg-chat{flex-direction:column;min-height:100vh}
.chat-hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 12px;height:58px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:10}
.back-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:26px;padding:4px;line-height:1;font-family:"Cairo",sans-serif}
.msgs-area{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;min-height:0}
.dsep{text-align:center;font-size:11px;color:var(--dim);margin:8px 0;padding:4px 12px;background:var(--sur2);border-radius:20px;display:inline-block;align-self:center}
.mrow{display:flex;align-items:flex-end;gap:7px}
.mrow.me{flex-direction:row-reverse}
.mav{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white;flex-shrink:0;font-family:"Cairo",sans-serif}
.bbl{max-width:75%;padding:9px 13px;border-radius:16px;word-break:break-word}
.me .bbl{background:#1d4ed8;border-bottom-right-radius:4px;color:white}
.other .bbl{background:var(--sur2);border-bottom-left-radius:4px;border:1px solid var(--bdr);color:var(--txt)}
.mtxt{font-size:13px;line-height:1.6}
.mtime{font-size:10px;opacity:.6;margin-top:4px}
.me .mtime{text-align:right}
.mimg{max-width:200px;border-radius:10px;display:block;margin-top:5px;cursor:pointer}

/* INPUT AREA */
.inp-area{background:var(--sur);border-top:1px solid var(--bdr);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;bottom:0}
.minp{flex:1;background:var(--sur2);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:22px;padding:10px 16px;outline:none;font-size:14px;resize:none;line-height:1.5;max-height:100px;-webkit-appearance:none;transition:border-color .2s;display:block;width:100%}
.minp:focus{border-color:var(--blue)}
.minp::placeholder{color:var(--dim)}
.sbtn{width:42px;height:42px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:"Cairo",sans-serif}
.abtn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:22px;flex-shrink:0;padding:4px;line-height:1}

/* ── SEARCH MODAL ── */
#pg-search{align-items:flex-end;justify-content:center;min-height:100vh;display:none;background:rgba(0,0,0,.7);position:fixed;inset:0;z-index:100;backdrop-filter:blur(4px)}
#pg-search.vis{display:flex}
.sbox{background:var(--sur);border:1px solid var(--bdr);border-radius:18px 18px 0 0;width:100%;max-width:600px;padding:18px 16px;max-height:85vh;overflow-y:auto}
.shandle{width:36px;height:3px;background:var(--bdr);border-radius:2px;margin:0 auto 14px}
.stitle{font-size:15px;font-weight:900;margin-bottom:14px}
.sinp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:10px;padding:11px 13px;outline:none;font-size:14px;-webkit-appearance:none;margin-bottom:12px;transition:border-color .2s}
.sinp:focus{border-color:var(--blue)}
.sinp::placeholder{color:var(--dim)}
.urow{display:flex;align-items:center;gap:11px;padding:12px;border-radius:10px;cursor:pointer;transition:background .1s}
.urow:active{background:var(--sur2)}
.uav{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:white;flex-shrink:0;font-family:"Cairo",sans-serif}

/* ── IMG VIEW ── */
#img-view{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;display:none;align-items:center;justify-content:center}
#img-view.open{display:flex}
#iv-img{max-width:96vw;max-height:96vh;border-radius:8px}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--blue);color:white;font-family:"Cairo",sans-serif;font-weight:700;font-size:12px;padding:9px 18px;border-radius:24px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- AUTH -->
<div class="page" id="pg-auth">
  <div class="abox">
    <div class="alogo"><span class="ico">💬</span><div class="tit">محادثات عسل در النجف</div></div>
    <div class="atabs">
      <button class="atb on" onclick="swTab('l')">دخول</button>
      <button class="atb" onclick="swTab('r')">حساب جديد</button>
    </div>
    <div class="fg vis" id="fg-l">
      <div><label class="lbl">البريد الإلكتروني</label><input class="finp" id="l-em" type="email" placeholder="example@email.com" autocomplete="email"></div>
      <div><label class="lbl">كلمة المرور</label><input class="finp" id="l-pw" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="ferr" id="l-err"></div>
      <button class="fbtn" id="l-btn" onclick="doLogin()">دخول</button>
    </div>
    <div class="fg" id="fg-r">
      <div><label class="lbl">الاسم الكامل</label><input class="finp" id="r-nm" type="text" placeholder="اسمك الكامل" autocomplete="name"></div>
      <div><label class="lbl">البريد الإلكتروني</label><input class="finp" id="r-em" type="email" placeholder="example@email.com" autocomplete="email"></div>
      <div><label class="lbl">كلمة المرور</label><input class="finp" id="r-pw" type="password" placeholder="6 أحرف على الأقل" autocomplete="new-password"></div>
      <div><label class="lbl">تأكيد كلمة المرور</label><input class="finp" id="r-pw2" type="password" placeholder="••••••••"></div>
      <div class="ferr" id="r-err"></div>
      <button class="fbtn" id="r-btn" onclick="doReg()">إنشاء حساب</button>
    </div>
  </div>
</div>

<!-- CONV LIST -->
<div class="page" id="pg-list">
  <div class="hdr">
    <div class="hdr-l">
      <div class="av" id="my-av" style="background:#1d4ed8;font-size:16px">؟</div>
      <div class="htitle">💬 المحادثات</div>
    </div>
    <div class="hdr-r">
      <button class="ibtn" onclick="openSearch()" title="محادثة جديدة">✏️</button>
      <button class="ibtn" onclick="doLogout()" title="خروج" style="font-size:16px">🚪</button>
    </div>
  </div>
  <div class="clist" id="clist"></div>
  <button class="fab" onclick="openSearch()">✏</button>
</div>

<!-- CHAT ROOM -->
<div class="page" id="pg-chat">
  <div class="chat-hdr">
    <button class="back-btn" onclick="goBack()">‹</button>
    <div class="av" id="ch-av" style="background:#7c3aed">؟</div>
    <div>
      <div class="htitle" id="ch-name">—</div>
      <div style="font-size:11px;color:var(--grn)">نشط</div>
    </div>
  </div>
  <div class="msgs-area" id="msgs-area"></div>
  <div class="inp-area">
    <button class="abtn" onclick="document.getElementById('finp').click()">📎</button>
    <input type="file" id="finp" accept="image/*" style="display:none" onchange="handleFile(this)">
    <textarea class="minp" id="minp" placeholder="اكتب رسالة..." rows="1" onkeydown="onKey(event)"></textarea>
    <button class="sbtn" onclick="sendMsg()">➤</button>
  </div>
</div>

<!-- SEARCH -->
<div id="pg-search" onclick="if(event.target===this)closeSearch()">
  <div class="sbox">
    <div class="shandle"></div>
    <div class="stitle">محادثة جديدة</div>
    <input class="sinp" id="sinp" type="text" placeholder="ابحث بالاسم (3 أحرف على الأقل)..." oninput="doSearch()">
    <div id="sres"><div class="empty" style="padding:16px"><div class="ei" style="font-size:32px">🔍</div><div style="font-size:13px">ابحث عن مستخدم</div></div></div>
  </div>
</div>

<!-- IMG VIEW -->
<div id="img-view" onclick="closeImg()"><img id="iv-img" src=""></div>

<div id="toast"></div>

<script>
var SB=supabase.createClient("https://kffnbyevvrozemloovvy.supabase.co","sb_publishable_M8qhgvBV_3lSdc3L8lv4Eg_C9kO3e62");
var CU=null,CONV=null,MSGS=[],CONVS=[],PROFS=[],MCH=null,PF=null;

function G(id){return document.getElementById(id);}
function clr(id){var e=G(id);if(e)e.innerHTML="";}
function showPage(pg){
  ["pg-auth","pg-list","pg-chat"].forEach(function(p){G(p).classList.remove("vis");});
  G("pg-search").classList.remove("vis");
  G(pg).classList.add("vis");
}
function T(msg){var t=G("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
function Err(id,msg){var e=G(id);e.textContent=msg;e.style.display="block";setTimeout(function(){e.style.display="none";},4000);}
function col(id){var c=["#1d4ed8","#7c3aed","#db2777","#059669","#d97706","#dc2626","#0284c7"];return id?c[id.charCodeAt(0)%c.length]:c[0];}
function ft(ts){
  if(!ts)return "";
  var d=new Date(ts),n=new Date(),df=Math.floor((n-d)/1000);
  if(df<60)return "الآن";
  if(df<3600)return Math.floor(df/60)+" د";
  if(d.toDateString()===n.toDateString())return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
  return d.getDate()+"/"+(d.getMonth()+1);
}
function es(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── TABS ──
function swTab(t){
  G("fg-l").classList.toggle("vis",t==="l");
  G("fg-r").classList.toggle("vis",t==="r");
  document.querySelectorAll(".atb").forEach(function(b,i){b.classList.toggle("on",i===(t==="l"?0:1));});
}

// ── LOGIN ──
function doLogin(){
  var em=G("l-em").value.trim(),pw=G("l-pw").value;
  if(!em||!pw){Err("l-err","يرجى ملء الحقول");return;}
  G("l-btn").disabled=true;G("l-btn").textContent="جاري التحقق...";
  SB.auth.signInWithPassword({email:em,password:pw}).then(function(r){
    G("l-btn").disabled=false;G("l-btn").textContent="دخول";
    if(r.error){Err("l-err","خطأ: "+r.error.message);return;}
    CU=r.data.user;launch();
  }).catch(function(e){
    G("l-btn").disabled=false;G("l-btn").textContent="دخول";
    Err("l-err","خطأ في الاتصال");
  });
}

// ── REGISTER ──
function doReg(){
  var nm=G("r-nm").value.trim(),em=G("r-em").value.trim(),pw=G("r-pw").value,pw2=G("r-pw2").value;
  if(!nm||!em||!pw||!pw2){Err("r-err","يرجى ملء جميع الحقول");return;}
  if(pw!==pw2){Err("r-err","كلمتا المرور غير متطابقتين");return;}
  if(pw.length<6){Err("r-err","كلمة المرور 6 أحرف على الأقل");return;}
  G("r-btn").disabled=true;G("r-btn").textContent="جاري الإنشاء...";
  SB.auth.signUp({email:em,password:pw,options:{data:{full_name:nm}}}).then(function(r){
    G("r-btn").disabled=false;G("r-btn").textContent="إنشاء حساب";
    if(r.error){Err("r-err",r.error.message);return;}
    CU=r.data.user;
    SB.from("profiles").upsert({id:CU.id,full_name:nm,email:em}).then(function(){launch();});
  }).catch(function(){G("r-btn").disabled=false;G("r-btn").textContent="إنشاء حساب";Err("r-err","حدث خطأ");});
}

// ── LOGOUT ──
function doLogout(){
  if(!confirm("تسجيل الخروج؟"))return;
  if(MCH)SB.removeChannel(MCH);
  CU=null;CONV=null;CONVS=[];PROFS=[];
  SB.auth.signOut().then(function(){showPage("pg-auth");});
}

// ── LAUNCH ──
function launch(){
  if(!CU)return;
  var meta=CU.user_metadata||{};
  var nm=(meta.full_name||CU.email||"م")[0].toUpperCase();
  G("my-av").textContent=nm;
  G("my-av").style.background=col(CU.id);
  showPage("pg-list");
  SB.from("profiles").select("id,full_name,email").then(function(r){PROFS=r.data||[];});
  loadConvs();
}

// ── PROFILES ──
function getP(id){
  for(var i=0;i<PROFS.length;i++){if(PROFS[i].id===id)return PROFS[i];}
  return {full_name:"مستخدم",email:""};
}

// ── CONVS ──
function loadConvs(){
  SB.from("conversations").select("*").or("user1_id.eq."+CU.id+",user2_id.eq."+CU.id).order("last_message_at",{ascending:false}).then(function(r){
    CONVS=r.data||[];renderConvs();
  });
}
function renderConvs(){
  var el=G("clist"),html="";
  if(!CONVS.length){el.innerHTML='<div class="empty"><div class="ei">💬</div><div>لا توجد محادثات بعد<br><small>اضغط ✏️ لبدء محادثة جديدة</small></div></div>';return;}
  for(var i=0;i<CONVS.length;i++){
    var c=CONVS[i];
    var oid=c.user1_id===CU.id?c.user2_id:c.user1_id;
    var p=getP(oid);var nm=p.full_name||p.email||"مستخدم";
    html+='<div class="citem" data-i="'+i+'"><div class="cav" style="background:'+col(oid)+'">'+nm[0].toUpperCase()+'</div>'
      +'<div class="cinfo"><div class="cname">'+es(nm)+'</div>'
      +'<div class="clast">'+es(c.last_message||"ابدأ المحادثة...")+'</div></div>'
      +'<div class="ctime">'+ft(c.last_message_at)+'</div></div>';
  }
  el.innerHTML=html;
  el.querySelectorAll(".citem").forEach(function(item){
    item.addEventListener("click",function(){openChat(CONVS[parseInt(item.dataset.i)]);});
  });
}

// ── CHAT ──
function openChat(conv){
  CONV=conv;
  var oid=conv.user1_id===CU.id?conv.user2_id:conv.user1_id;
  var p=getP(oid);var nm=p.full_name||p.email||"مستخدم";
  G("ch-name").textContent=nm;
  G("ch-av").textContent=nm[0].toUpperCase();
  G("ch-av").style.background=col(oid);
  showPage("pg-chat");
  loadMsgs(conv.id);
  subChat(conv.id);
}
function goBack(){
  if(MCH){SB.removeChannel(MCH);MCH=null;}
  CONV=null;showPage("pg-list");loadConvs();
}

// ── MSGS ──
function loadMsgs(cid){
  G("msgs-area").innerHTML='<div class="empty"><div class="ei" style="font-size:32px">⏳</div></div>';
  SB.from("messages").select("*").eq("conversation_id",cid).order("created_at",{ascending:true}).then(function(r){
    MSGS=r.data||[];renderMsgs();scrollD();
  });
}
function renderMsgs(){
  var el=G("msgs-area"),html="",ld="";
  if(!MSGS.length){el.innerHTML='<div class="empty"><div class="ei">💬</div><div>لا رسائل بعد — قل مرحباً! 👋</div></div>';return;}
  for(var i=0;i<MSGS.length;i++){
    var m=MSGS[i],me=m.sender_id===CU.id;
    var p=getP(m.sender_id);var pnm=(p.full_name||"م")[0].toUpperCase();
    var d=new Date(m.created_at),ds=d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();
    if(ds!==ld){html+='<div class="dsep">'+ds+'</div>';ld=ds;}
    var tm=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
    var body="";
    if(m.file_url){
      if(m.file_type&&m.file_type.slice(0,5)==="image"){
        body+='<img class="mimg" src="'+es(m.file_url)+'" onclick="openImg(this.src)" loading="lazy">';
      }else{
        body+='<a href="'+es(m.file_url)+'" target="_blank" style="color:'+(me?"#fff":"var(--blue)")+';font-size:12px">📎 '+(m.file_name||"ملف")+'</a>';
      }
    }
    if(m.content)body+='<div class="mtxt">'+es(m.content)+'</div>';
    html+='<div class="mrow '+(me?"me":"other")+'">'
      +(me?"":'<div class="mav" style="background:'+col(m.sender_id)+'">'+pnm+'</div>')
      +'<div class="bbl">'+body+'<div class="mtime">'+tm+(me?" · "+(m.is_read?"✓✓":"✓"):"")+'</div></div>'
      +(me?'<div class="mav" style="background:'+col(m.sender_id)+'">'+pnm+'</div>':"")
      +'</div>';
  }
  el.innerHTML=html;
}
function scrollD(){var el=G("msgs-area");if(el){el.scrollTop=el.scrollHeight;}}
function subChat(cid){
  if(MCH)SB.removeChannel(MCH);
  MCH=SB.channel("mc"+cid).on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:"conversation_id=eq."+cid},function(p){
    var m=p.new;
    for(var i=0;i<MSGS.length;i++){if(MSGS[i].id===m.id)return;}
    MSGS.push(m);renderMsgs();scrollD();
  }).subscribe();
}

// ── SEND ──
function sendMsg(){
  var text=G("minp").value.trim();
  if(!text&&!PF)return;
  if(!CONV)return;
  var data={conversation_id:CONV.id,sender_id:CU.id,content:text||null};
  G("minp").value="";G("minp").style.height="auto";
  if(PF){
    var file=PF;PF=null;G("finp").value="";
    var ext=(file.name.split(".").pop()||"jpg");
    var path="chat/"+CU.id+"_"+Date.now()+"."+ext;
    SB.storage.from("products").upload(path,file,{upsert:true,contentType:file.type}).then(function(r){
      if(!r.error){
        data.file_url=SB.storage.from("products").getPublicUrl(path).data.publicUrl;
        data.file_type=file.type;data.file_name=file.name;
      }
      insertMsg(data);
    });
  }else{insertMsg(data);}
}
function insertMsg(data){
  SB.from("messages").insert([data]).then(function(){
    SB.from("conversations").update({last_message:data.content||"📎 ملف",last_message_at:new Date().toISOString()}).eq("id",CONV.id).then(function(){});
  });
}
function handleFile(inp){if(inp.files&&inp.files[0]){PF=inp.files[0];T("📎 "+PF.name+" — جاهز للإرسال");}}
function onKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}
G("minp").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,100)+"px";});

// ── SEARCH ──
function openSearch(){
  G("pg-search").classList.add("vis");
  G("sres").innerHTML='<div class="empty" style="padding:16px"><div class="ei" style="font-size:32px">🔍</div><div style="font-size:13px">ابحث عن مستخدم</div></div>';
  G("sinp").value="";
  setTimeout(function(){G("sinp").focus();},200);
}
function closeSearch(){G("pg-search").classList.remove("vis");}
var ST=null;
function doSearch(){
  if(ST)clearTimeout(ST);
  ST=setTimeout(function(){
    var q=G("sinp").value.trim();
    if(q.length<3){G("sres").innerHTML='<div class="empty" style="padding:16px"><div style="font-size:13px;color:var(--dim)">اكتب 3 أحرف على الأقل</div></div>';return;}
    G("sres").innerHTML='<div style="text-align:center;padding:14px;color:var(--mute)">جاري البحث...</div>';
    SB.from("profiles").select("id,full_name,email").neq("id",CU.id).ilike("full_name","%"+q+"%").limit(8).then(function(r){
      var list=r.data||[];
      if(!list.length){G("sres").innerHTML='<div class="empty" style="padding:16px"><div style="font-size:13px">لم يتم إيجاد مستخدم</div></div>';return;}
      var html="";
      for(var i=0;i<list.length;i++){
        var p=list[i];var nm=p.full_name||"مستخدم";
        html+='<div class="urow" data-i="'+i+'"><div class="uav" style="background:'+col(p.id)+'">'+nm[0].toUpperCase()+'</div>'
          +'<div><div style="font-size:14px;font-weight:700">'+es(nm)+'</div>'
          +'<div style="font-size:12px;color:var(--mute)">'+es(p.email||"")+'</div></div></div>';
      }
      G("sres").innerHTML=html;
      G("sres").querySelectorAll(".urow").forEach(function(row){
        row.addEventListener("click",function(){closeSearch();startConv(list[parseInt(row.dataset.i)]);});
      });
    });
  },400);
}
function startConv(profile){
  for(var i=0;i<CONVS.length;i++){
    var c=CONVS[i];
    if((c.user1_id===CU.id&&c.user2_id===profile.id)||(c.user1_id===profile.id&&c.user2_id===CU.id)){openChat(c);return;}
  }
  var u1=CU.id<profile.id?CU.id:profile.id;
  var u2=CU.id<profile.id?profile.id:CU.id;
  SB.from("conversations").insert([{user1_id:u1,user2_id:u2}]).select().single().then(function(r){
    if(r.error){T("خطأ في إنشاء المحادثة");return;}
    var found=false;for(var k=0;k<PROFS.length;k++){if(PROFS[k].id===profile.id){found=true;break;}}
    if(!found)PROFS.push(profile);
    CONVS.unshift(r.data);renderConvs();openChat(r.data);
  });
}

// ── IMG ──
function openImg(url){G("iv-img").src=url;G("img-view").classList.add("open");}
function closeImg(){G("img-view").classList.remove("open");}

// ── INIT ──
showPage("pg-auth");
SB.auth.getSession().then(function(r){
  if(r.data&&r.data.session&&r.data.session.user){CU=r.data.session.user;launch();}
});
SB.auth.onAuthStateChange(function(ev,sess){
  if(ev==="SIGNED_OUT"){CU=null;showPage("pg-auth");}
});
</script>
