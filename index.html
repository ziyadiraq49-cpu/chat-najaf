<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>محادثات عسل در النجف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d1117;--sur:#161b22;--sur2:#21262d;--bdr:#30363d;--txt:#e6edf3;--mute:#8b949e;--dim:#484f58;--blue:#58a6ff;--grn:#3fb950;--red:#f85149}
body{background:var(--bg);color:var(--txt);font-family:"Cairo",sans-serif;min-height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* AUTH */
#pg-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:28px 22px;width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:22px}
.auth-logo .ic{font-size:44px;display:block;margin-bottom:8px}
.auth-logo .tt{font-size:17px;font-weight:900;color:var(--blue)}
.auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:3px;margin-bottom:18px}
.atab{flex:1;padding:8px;border:none;background:transparent;color:var(--mute);font-family:"Cairo",sans-serif;font-size:13px;font-weight:700;border-radius:7px;cursor:pointer}
.atab.on{background:var(--blue);color:white}
.fg{display:none;flex-direction:column;gap:11px}
.fg.vis{display:flex}
.lbl{font-size:11px;color:var(--mute);font-weight:600;margin-bottom:4px}
.inp{background:var(--bg);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:9px;padding:10px 12px;width:100%;outline:none;font-size:14px;-webkit-appearance:none;transition:border-color .2s}
.inp:focus{border-color:var(--blue)}
.err-box{font-size:12px;color:var(--red);padding:9px 12px;background:#1a0505;border-radius:8px;display:none}
.btn{background:var(--blue);border:none;color:white;font-family:"Cairo",sans-serif;font-weight:900;font-size:14px;cursor:pointer;padding:12px;border-radius:9px;width:100%}
.btn:disabled{opacity:.5}

/* APP - CHAT LIST VIEW */
#pg-app{display:none;min-height:100vh;flex-direction:column}
#pg-app.vis{display:flex}

/* CHAT ROOM VIEW */
#pg-chat{display:none;flex-direction:column;height:100vh;position:fixed;inset:0;background:var(--bg);z-index:50}
#pg-chat.vis{display:flex}

.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 14px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-right{display:flex;align-items:center;gap:8px}
.av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:white;flex-shrink:0;cursor:pointer;border:none}
.hdr-title{font-size:15px;font-weight:900}
.hdr-sub{font-size:11px;color:var(--grn);margin-top:1px}
.icon-btn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:20px;padding:8px;border-radius:8px}

/* CONV LIST */
.conv-list{flex:1;overflow-y:auto}
.conv-item{display:flex;align-items:center;gap:11px;padding:14px 16px;cursor:pointer;border-bottom:1px solid rgba(48,54,61,.4)}
.conv-item:active{background:var(--sur2)}
.conv-av{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:white;flex-shrink:0}
.conv-info{flex:1;min-width:0}
.conv-name{font-size:14px;font-weight:700;margin-bottom:4px}
.conv-last{font-size:12px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-time{font-size:11px;color:var(--dim);flex-shrink:0}
.fab{position:fixed;bottom:24px;left:24px;width:52px;height:52px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(88,166,255,.4)}

/* MESSAGES */
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:5px;-webkit-overflow-scrolling:touch}
.msg-row{display:flex;align-items:flex-end;gap:7px}
.msg-row.me{flex-direction:row-reverse}
.msg-av-sm{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white;flex-shrink:0}
.bubble{max-width:74%;padding:8px 12px;border-radius:14px;word-break:break-word}
.me .bubble{background:#1d4ed8;border-bottom-right-radius:4px;color:white}
.other .bubble{background:var(--sur2);border-bottom-left-radius:4px;color:var(--txt);border:1px solid var(--bdr)}
.msg-txt{font-size:13px;line-height:1.6}
.msg-time{font-size:10px;opacity:.6;margin-top:3px}
.me .msg-time{text-align:right}
.msg-img{max-width:180px;border-radius:10px;cursor:pointer;display:block;margin-top:4px}
.date-sep{text-align:center;font-size:11px;color:var(--dim);margin:10px 0}

/* INPUT */
.input-area{background:var(--sur);border-top:1px solid var(--bdr);padding:10px 12px;display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.msg-field{background:var(--sur2);border:1px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:20px;padding:10px 14px;flex:1;outline:none;font-size:14px;resize:none;line-height:1.5;max-height:100px;min-height:42px;-webkit-appearance:none}
.msg-field:focus{border-color:var(--blue)}
.send-btn{background:var(--blue);border:none;color:white;width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.attach-btn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:22px;padding:4px;flex-shrink:0}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-bg.open{display:flex}
.modal-box{background:var(--sur);border:1px solid var(--bdr);border-radius:18px 18px 0 0;width:100%;max-width:600px;padding:18px 16px;max-height:80vh;overflow-y:auto}
.modal-handle{width:36px;height:3px;background:var(--bdr);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:15px;font-weight:900;margin-bottom:14px}
.user-row{display:flex;align-items:center;gap:11px;padding:12px;border-radius:10px;cursor:pointer;border:1px solid transparent}
.user-row:active{background:var(--sur2)}
.user-row-av{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:white;flex-shrink:0}

/* IMG VIEWER */
#img-view{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:300;display:none;align-items:center;justify-content:center}
#img-view.open{display:flex}
#img-view img{max-width:95vw;max-height:95vh;border-radius:8px}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--blue);color:white;font-family:"Cairo",sans-serif;font-weight:700;font-size:12px;padding:9px 18px;border-radius:24px;z-index:400;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.empty{padding:40px 20px;text-align:center;color:var(--mute)}
.empty .ei{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>

<!-- AUTH -->
<div id="pg-auth">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="ic">💬</span>
      <div class="tt">محادثات عسل در النجف</div>
    </div>
    <div class="auth-tabs">
      <button class="atab on" onclick="swTab('l')">دخول</button>
      <button class="atab" onclick="swTab('r')">حساب جديد</button>
    </div>
    <div class="fg vis" id="fg-l">
      <div><div class="lbl">البريد الإلكتروني</div><input class="inp" id="l-em" type="email" placeholder="example@email.com" autocomplete="email"></div>
      <div><div class="lbl">كلمة المرور</div><input class="inp" id="l-pw" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="err-box" id="l-err"></div>
      <button class="btn" id="l-btn" onclick="doLogin()">دخول</button>
    </div>
    <div class="fg" id="fg-r">
      <div><div class="lbl">الاسم الكامل *</div><input class="inp" id="r-nm" type="text" placeholder="اسمك الكامل" autocomplete="name"></div>
      <div><div class="lbl">البريد الإلكتروني *</div><input class="inp" id="r-em" type="email" placeholder="example@email.com" autocomplete="email"></div>
      <div><div class="lbl">كلمة المرور *</div><input class="inp" id="r-pw" type="password" placeholder="6 أحرف على الأقل" autocomplete="new-password"></div>
      <div><div class="lbl">تأكيد كلمة المرور *</div><input class="inp" id="r-pw2" type="password" placeholder="••••••••"></div>
      <div class="err-box" id="r-err"></div>
      <button class="btn" id="r-btn" onclick="doReg()">إنشاء حساب</button>
    </div>
  </div>
</div>

<!-- APP - CONV LIST -->
<div id="pg-app">
  <div class="hdr">
    <div class="hdr-left">
      <div class="av" id="my-av" style="background:#1d4ed8" onclick="doLogout()">؟</div>
      <div><div class="hdr-title">💬 المحادثات</div></div>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" onclick="openNewChat()">✏️</button>
    </div>
  </div>
  <div class="conv-list" id="conv-list"><div class="empty"><div class="ei">💬</div><div>لا توجد محادثات بعد</div></div></div>
  <button class="fab" onclick="openNewChat()">+</button>
</div>

<!-- CHAT ROOM -->
<div id="pg-chat">
  <div class="hdr">
    <div class="hdr-left">
      <button class="icon-btn" onclick="closeChat()" style="font-size:24px">‹</button>
      <div class="av" id="chat-av" style="background:#7c3aed">؟</div>
      <div>
        <div class="hdr-title" id="chat-name">—</div>
        <div class="hdr-sub">نشط</div>
      </div>
    </div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="input-area">
    <button class="attach-btn" onclick="document.getElementById('file-inp').click()">📎</button>
    <input type="file" id="file-inp" accept="image/*" style="display:none" onchange="handleFile(this)">
    <textarea class="msg-field" id="msg-field" placeholder="اكتب رسالة..." rows="1"></textarea>
    <button class="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>

<!-- NEW CHAT MODAL -->
<div class="modal-bg" id="modal-nc" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">محادثة جديدة</div>
    <div style="margin-bottom:12px">
      <input class="inp" id="srch-inp" placeholder="ابحث بالاسم أو @المعرف (3 أحرف على الأقل)..." oninput="doSearch()">
    </div>
    <div id="srch-results"><div class="empty" style="padding:20px"><div class="ei" style="font-size:32px">🔍</div><div style="font-size:13px">ابحث عن مستخدم للتواصل معه</div></div></div>
  </div>
</div>

<!-- IMG VIEWER -->
<div id="img-view" onclick="closeImg()"><img id="img-v" src=""></div>

<div id="toast"></div>

<script>
var SURL="https://kffnbyevvrozemloovvy.supabase.co";
var SKEY="sb_publishable_M8qhgvBV_3lSdc3L8lv4Eg_C9kO3e62";
var sb=supabase.createClient(SURL,SKEY);
var CU=null,curConv=null,msgs=[],convs=[],profiles=[],msgCh=null,pendingFile=null;

function $(id){return document.getElementById(id);}
function show(id){$(id).style.display="";}
function hide(id){$(id).style.display="none";}
function showPg(pg){
  $("pg-auth").style.display="none";
  $("pg-app").classList.remove("vis");
  $("pg-chat").classList.remove("vis");
  if(pg==="auth")$("pg-auth").style.display="flex";
  else if(pg==="app")$("pg-app").classList.add("vis");
  else if(pg==="chat")$("pg-chat").classList.add("vis");
}
function toast(msg){var t=$("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
function showErr(id,msg){var e=$(id);e.textContent=msg;e.style.display="block";setTimeout(function(){e.style.display="none";},4000);}
function getColor(id){var c=["#1d4ed8","#7c3aed","#db2777","#059669","#d97706","#dc2626","#0284c7"];return c[id?(id.charCodeAt(0)%c.length):0];}
function fTime(ts){
  if(!ts)return"";
  var d=new Date(ts),n=new Date();
  var diff=Math.floor((n-d)/1000);
  if(diff<60)return"الآن";
  if(diff<3600)return Math.floor(diff/60)+" د";
  if(d.toDateString()===n.toDateString())return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
  return d.getDate()+"/"+(d.getMonth()+1);
}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/
/g,"<br>");}

// ── AUTH TABS ──
function swTab(t){
  $("fg-l").classList.toggle("vis",t==="l");
  $("fg-r").classList.toggle("vis",t==="r");
  document.querySelectorAll(".atab").forEach(function(b,i){b.classList.toggle("on",["l","r"][i]===t);});
}

// ── LOGIN ──
async function doLogin(){
  var em=$("l-em").value.trim(),pw=$("l-pw").value;
  if(!em||!pw){showErr("l-err","يرجى ملء الحقول");return;}
  $("l-btn").disabled=true;$("l-btn").textContent="جاري التحقق...";
  try{
    var r=await sb.auth.signInWithPassword({email:em,password:pw});
    if(r.error){showErr("l-err","بيانات غير صحيحة");$("l-btn").disabled=false;$("l-btn").textContent="دخول";return;}
    CU=r.data.user;
    await launch();
  }catch(e){showErr("l-err","حدث خطأ، حاول مجدداً");$("l-btn").disabled=false;$("l-btn").textContent="دخول";}
}

// ── REGISTER ──
async function doReg(){
  var nm=$("r-nm").value.trim(),em=$("r-em").value.trim(),pw=$("r-pw").value,pw2=$("r-pw2").value;
  if(!nm||!em||!pw||!pw2){showErr("r-err","يرجى ملء جميع الحقول");return;}
  if(pw!==pw2){showErr("r-err","كلمتا المرور غير متطابقتين");return;}
  if(pw.length<6){showErr("r-err","كلمة المرور 6 أحرف على الأقل");return;}
  $("r-btn").disabled=true;$("r-btn").textContent="جاري الإنشاء...";
  try{
    var r=await sb.auth.signUp({email:em,password:pw,options:{data:{full_name:nm}}});
    if(r.error){showErr("r-err",r.error.message);$("r-btn").disabled=false;$("r-btn").textContent="إنشاء حساب";return;}
    CU=r.data.user;
    await sb.from("profiles").upsert({id:CU.id,full_name:nm,email:em});
    await launch();
  }catch(e){showErr("r-err","حدث خطأ، حاول مجدداً");$("r-btn").disabled=false;$("r-btn").textContent="إنشاء حساب";}
}

// ── LOGOUT ──
async function doLogout(){
  if(!confirm("تسجيل الخروج؟"))return;
  CU=null;convs=[];profiles=[];
  await sb.auth.signOut();
  showPg("auth");
}

// ── LAUNCH ──
async function launch(){
  if(!CU)return;
  var meta=CU.user_metadata||{};
  var nm=(meta.full_name||CU.email||"م")[0].toUpperCase();
  $("my-av").textContent=nm;
  $("my-av").style.background=getColor(CU.id);
  showPg("app");
  await loadProfiles();
  await loadConvs();
}

// ── PROFILES ──
async function loadProfiles(){
  var r=await sb.from("profiles").select("id,full_name,email");
  profiles=r.data||[];
}
function getProfile(id){
  for(var i=0;i<profiles.length;i++){if(profiles[i].id===id)return profiles[i];}
  return {full_name:"مستخدم",email:""};
}

// ── CONVS ──
async function loadConvs(){
  var r=await sb.from("conversations").select("*").or("user1_id.eq."+CU.id+",user2_id.eq."+CU.id).order("last_message_at",{ascending:false});
  convs=r.data||[];
  renderConvs();
}
function renderConvs(){
  var el=$("conv-list");
  if(!convs.length){el.innerHTML='<div class="empty"><div class="ei">💬</div><div>لا توجد محادثات بعد<br><small>اضغط + لبدء محادثة جديدة</small></div></div>';return;}
  var html="";
  for(var i=0;i<convs.length;i++){
    var c=convs[i];
    var oid=c.user1_id===CU.id?c.user2_id:c.user1_id;
    var p=getProfile(oid);
    var nm=p.full_name||p.email||"مستخدم";
    var col=getColor(oid);
    html+='<div class="conv-item" data-cid="'+c.id+'" data-oid="'+oid+'">'
      +'<div class="conv-av" style="background:'+col+'">'+nm[0].toUpperCase()+'</div>'
      +'<div class="conv-info"><div class="conv-name">'+esc(nm)+'</div>'
      +'<div class="conv-last">'+(c.last_message||"ابدأ المحادثة...")+'</div></div>'
      +'<div class="conv-time">'+fTime(c.last_message_at)+'</div></div>';
  }
  el.innerHTML=html;
  // Add click events
  var items=el.querySelectorAll(".conv-item");
  for(var j=0;j<items.length;j++){
    (function(item){
      item.addEventListener("click",function(){
        var cid=item.dataset.cid;
        var conv=null;
        for(var k=0;k<convs.length;k++){if(convs[k].id===cid){conv=convs[k];break;}}
        if(conv)openChat(conv);
      });
    })(items[j]);
  }
}

// ── OPEN CHAT ──
function openChat(conv){
  curConv=conv;
  var oid=conv.user1_id===CU.id?conv.user2_id:conv.user1_id;
  var p=getProfile(oid);
  var nm=p.full_name||p.email||"مستخدم";
  $("chat-name").textContent=nm;
  $("chat-av").textContent=nm[0].toUpperCase();
  $("chat-av").style.background=getColor(oid);
  showPg("chat");
  loadMsgs();
  subscribeChat(conv.id);
}
function closeChat(){
  if(msgCh){sb.removeChannel(msgCh);msgCh=null;}
  curConv=null;
  showPg("app");
  loadConvs();
}

// ── MESSAGES ──
async function loadMsgs(){
  $("msgs").innerHTML='<div class="empty"><div style="font-size:24px">⏳</div></div>';
  var r=await sb.from("messages").select("*").eq("conversation_id",curConv.id).order("created_at",{ascending:true});
  msgs=r.data||[];
  renderMsgs();
  scrollDown();
}
function renderMsgs(){
  var el=$("msgs");
  if(!msgs.length){el.innerHTML='<div class="empty"><div class="ei">💬</div><div>لا توجد رسائل بعد. قل مرحباً! 👋</div></div>';return;}
  var html="",lastDate="";
  for(var i=0;i<msgs.length;i++){
    var m=msgs[i];
    var isMe=m.sender_id===CU.id;
    var p=getProfile(m.sender_id);
    var col=getColor(m.sender_id);
    var nm=(p.full_name||"م")[0].toUpperCase();
    var d=new Date(m.created_at).toLocaleDateString("ar",{weekday:"long",day:"numeric",month:"long"});
    if(d!==lastDate){html+='<div class="date-sep">'+d+'</div>';lastDate=d;}
    var t=new Date(m.created_at);
    var timeStr=t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");
    var content="";
    if(m.file_url){
      if(m.file_type&&m.file_type.indexOf("image")===0){
        content='<img class="msg-img" src="'+m.file_url+'" onclick="openImg(''+m.file_url+'')" loading="lazy">';
      }else{
        content='<a href="'+m.file_url+'" target="_blank" style="color:'+( isMe?"white":"var(--blue)")+';font-size:12px">📎 '+(m.file_name||"ملف")+'</a>';
      }
    }
    if(m.content)content+='<div class="msg-txt">'+esc(m.content)+'</div>';
    html+='<div class="msg-row '+(isMe?"me":"other")+'">'
      +(isMe?"":'<div class="msg-av-sm" style="background:'+col+'">'+nm+'</div>')
      +'<div class="bubble">'+content+'<div class="msg-time">'+timeStr+(isMe?" · "+(m.is_read?"✓✓":"✓"):"")+'</div></div>'
      +(isMe?'<div class="msg-av-sm" style="background:'+col+'">'+nm+'</div>':"")
      +'</div>';
  }
  el.innerHTML=html;
}
function scrollDown(){var el=$("msgs");if(el)el.scrollTop=el.scrollHeight;}
function subscribeChat(cid){
  if(msgCh)sb.removeChannel(msgCh);
  msgCh=sb.channel("m"+cid)
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:"conversation_id=eq."+cid},function(p){
      var m=p.new;
      for(var i=0;i<msgs.length;i++){if(msgs[i].id===m.id)return;}
      msgs.push(m);renderMsgs();scrollDown();
    }).subscribe();
}

// ── SEND ──
async function sendMsg(){
  var text=$("msg-field").value.trim();
  if(!text&&!pendingFile)return;
  if(!curConv)return;
  var data={conversation_id:curConv.id,sender_id:CU.id,content:text||null};
  if(pendingFile){
    var url=await uploadFile(pendingFile);
    if(url){data.file_url=url;data.file_type=pendingFile.type;data.file_name=pendingFile.name;}
    pendingFile=null;$("file-inp").value="";
  }
  $("msg-field").value="";
  $("msg-field").style.height="auto";
  await sb.from("messages").insert([data]);
  await sb.from("conversations").update({last_message:text||"📎 ملف",last_message_at:new Date().toISOString()}).eq("id",curConv.id);
}
async function uploadFile(file){
  var ext=(file.name.split(".").pop()||"jpg");
  var path="chat/"+CU.id+"_"+Date.now()+"."+ext;
  var r=await sb.storage.from("products").upload(path,file,{upsert:true,contentType:file.type});
  if(r.error){toast("فشل رفع الملف");return null;}
  return sb.storage.from("products").getPublicUrl(path).data.publicUrl;
}
function handleFile(inp){
  if(inp.files&&inp.files[0]){pendingFile=inp.files[0];toast("📎 "+pendingFile.name);}
}

// ── TEXTAREA AUTO RESIZE ──
$("msg-field").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,100)+"px";});
$("msg-field").addEventListener("keydown",function(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}});

// ── NEW CHAT ──
function openNewChat(){
  $("modal-nc").classList.add("open");
  $("srch-inp").value="";
  $("srch-results").innerHTML='<div class="empty" style="padding:20px"><div class="ei" style="font-size:32px">🔍</div><div style="font-size:13px">ابحث عن مستخدم للتواصل معه</div></div>';
  setTimeout(function(){$("srch-inp").focus();},300);
}
function closeModal(){$("modal-nc").classList.remove("open");}
var srchTimer=null;
function doSearch(){
  if(srchTimer)clearTimeout(srchTimer);
  srchTimer=setTimeout(async function(){
    var q=$("srch-inp").value.trim();
    if(q.length<3){$("srch-results").innerHTML='<div class="empty" style="padding:20px"><div style="font-size:13px;color:var(--dim)">اكتب 3 أحرف على الأقل</div></div>';return;}
    $("srch-results").innerHTML='<div style="text-align:center;padding:16px;color:var(--mute)">جاري البحث...</div>';
    var r=await sb.from("profiles").select("id,full_name,email").neq("id",CU.id).ilike("full_name","%"+q+"%").limit(8);
    var list=r.data||[];
    if(!list.length){$("srch-results").innerHTML='<div class="empty" style="padding:20px"><div style="font-size:13px">لم يتم إيجاد مستخدم</div></div>';return;}
    var html="";
    for(var i=0;i<list.length;i++){
      var p=list[i];
      var col=getColor(p.id);
      var nm=p.full_name||"مستخدم";
      html+='<div class="user-row" data-uid="'+p.id+'" data-nm="'+esc(nm)+'">'
        +'<div class="user-row-av" style="background:'+col+'">'+nm[0].toUpperCase()+'</div>'
        +'<div><div style="font-size:13px;font-weight:700">'+esc(nm)+'</div>'
        +'<div style="font-size:11px;color:var(--mute)">'+esc(p.email||"")+'</div></div></div>';
    }
    $("srch-results").innerHTML=html;
    var rows=$("srch-results").querySelectorAll(".user-row");
    for(var j=0;j<rows.length;j++){
      (function(row,profile){
        row.addEventListener("click",function(){closeModal();startConv(profile);});
      })(rows[j],list[j]);
    }
  },400);
}
async function startConv(profile){
  // Check if conv exists
  var existing=null;
  for(var i=0;i<convs.length;i++){
    var c=convs[i];
    if((c.user1_id===CU.id&&c.user2_id===profile.id)||(c.user1_id===profile.id&&c.user2_id===CU.id)){existing=c;break;}
  }
  if(existing){openChat(existing);return;}
  var u1=CU.id<profile.id?CU.id:profile.id;
  var u2=CU.id<profile.id?profile.id:CU.id;
  var r=await sb.from("conversations").insert([{user1_id:u1,user2_id:u2}]).select().single();
  if(r.error){toast("خطأ في إنشاء المحادثة");return;}
  // Add to profiles cache
  var found=false;
  for(var k=0;k<profiles.length;k++){if(profiles[k].id===profile.id){found=true;break;}}
  if(!found)profiles.push(profile);
  convs.unshift(r.data);
  renderConvs();
  openChat(r.data);
}

// ── IMG VIEWER ──
function openImg(url){$("img-v").src=url;$("img-view").classList.add("open");}
function closeImg(){$("img-view").classList.remove("open");}

// ── CHECK SESSION ──
(async function(){
  try{
    var s=await sb.auth.getSession();
    if(s.data&&s.data.session&&s.data.session.user){
      CU=s.data.session.user;
      await launch();
    } else {
      showPg("auth");
    }
  }catch(e){showPg("auth");}
})();
</script>
