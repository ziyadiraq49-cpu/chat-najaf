<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d1117">
<title>محادثات عسل در النجف</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d1117;--sur:#161b22;--sur2:#21262d;--bdr:#30363d;--txt:#e6edf3;--mute:#8b949e;--dim:#484f58;--blue:#58a6ff;--grn:#3fb950;--red:#f85149}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:"Cairo",sans-serif}
body{display:flex;flex-direction:column}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
.page{display:none;flex-direction:column;min-height:100vh}
.page.vis{display:flex}

/* ── AUTH ── */
#pg-auth{align-items:center;justify-content:center;padding:24px}
.abox{background:var(--sur);border:1px solid var(--bdr);border-radius:16px;padding:28px 22px;width:100%;max-width:380px}
.alogo{text-align:center;margin-bottom:22px}
.alogo .ico{font-size:44px;display:block;margin-bottom:8px}
.alogo .tit{font-size:17px;font-weight:900;color:var(--blue)}
.atabs{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:3px;margin-bottom:18px}
.atb{flex:1;padding:8px;border:none;background:transparent;color:var(--mute);font-family:"Cairo",sans-serif;font-size:13px;font-weight:700;border-radius:7px;cursor:pointer;transition:all .2s}
.atb.on{background:var(--blue);color:white}
.fg{display:none;flex-direction:column;gap:12px}
.fg.vis{display:flex}
.lbl{font-size:11px;color:var(--mute);font-weight:600;margin-bottom:4px;display:block}
.finp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:9px;padding:11px 13px;outline:none;font-size:15px;-webkit-appearance:none;transition:border-color .2s}
.finp:focus{border-color:var(--blue)}
.finp::placeholder{color:var(--dim)}
.ferr{font-size:12px;color:var(--red);padding:9px 12px;background:#1a0505;border-radius:8px;display:none;margin-top:-4px}
.fbtn{width:100%;background:var(--blue);border:none;color:white;font-family:"Cairo",sans-serif;font-weight:900;font-size:15px;cursor:pointer;padding:13px;border-radius:10px;transition:opacity .2s}
.fbtn:disabled{opacity:.5}

/* ── CONV LIST ── */
#pg-list{flex-direction:column;min-height:100vh}
.hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 16px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-r{display:flex;gap:6px}
.av{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:white;flex-shrink:0;cursor:pointer;border:none;font-family:"Cairo",sans-serif}
.htitle{font-size:15px;font-weight:900}
.ibtn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:22px;padding:6px;border-radius:8px;line-height:1}
.clist{flex:1}
.citem{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid rgba(48,54,61,.4);transition:background .1s}
.citem:active{background:var(--sur2)}
.cav{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:white;flex-shrink:0}
.cinfo{flex:1;min-width:0}
.cname{font-size:14px;font-weight:700;margin-bottom:4px}
.clast{font-size:12px;color:var(--mute);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ctime{font-size:11px;color:var(--dim);flex-shrink:0}
.fab{position:fixed;bottom:24px;left:20px;width:54px;height:54px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(88,166,255,.4);display:flex;align-items:center;justify-content:center;z-index:20;font-family:"Cairo",sans-serif}
.empty{padding:48px 20px;text-align:center;color:var(--mute)}
.empty .ei{font-size:52px;margin-bottom:14px}

/* ── CHAT ROOM ── */
#pg-chat{flex-direction:column;min-height:100vh}
.chat-hdr{background:var(--sur);border-bottom:1px solid var(--bdr);padding:0 12px;height:58px;display:flex;align-items:center;gap:10px;flex-shrink:0;position:sticky;top:0;z-index:10}
.back-btn{background:none;border:none;color:var(--blue);cursor:pointer;font-size:26px;padding:4px;line-height:1;font-family:"Cairo",sans-serif}
.msgs-area{flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;min-height:0}
.dsep{text-align:center;font-size:11px;color:var(--dim);margin:8px 0;padding:4px 12px;background:var(--sur2);border-radius:20px;display:inline-block;align-self:center}
.mrow{display:flex;align-items:flex-end;gap:7px}
.mrow.me{flex-direction:row-reverse}
.mav{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:white;flex-shrink:0;font-family:"Cairo",sans-serif}
.bbl{max-width:75%;padding:9px 13px;border-radius:16px;word-break:break-word}
.me .bbl{background:#1d4ed8;border-bottom-right-radius:4px;color:white}
.other .bbl{background:var(--sur2);border-bottom-left-radius:4px;border:1px solid var(--bdr);color:var(--txt)}
.mtxt{font-size:13px;line-height:1.6}
.mtime{font-size:10px;opacity:.6;margin-top:4px}
.me .mtime{text-align:right}
.mimg{max-width:200px;border-radius:10px;display:block;margin-top:5px;cursor:pointer}

/* INPUT AREA */
.inp-area{background:var(--sur);border-top:1px solid var(--bdr);padding:10px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;position:sticky;bottom:0}
.minp{flex:1;background:var(--sur2);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:22px;padding:10px 16px;outline:none;font-size:14px;resize:none;line-height:1.5;max-height:100px;-webkit-appearance:none;transition:border-color .2s;display:block;width:100%}
.minp:focus{border-color:var(--blue)}
.minp::placeholder{color:var(--dim)}
.sbtn{width:42px;height:42px;border-radius:50%;background:var(--blue);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:"Cairo",sans-serif}
.abtn{background:none;border:none;color:var(--mute);cursor:pointer;font-size:22px;flex-shrink:0;padding:4px;line-height:1}

/* ── SEARCH MODAL ── */
#pg-search{align-items:flex-end;justify-content:center;min-height:100vh;display:none;background:rgba(0,0,0,.7);position:fixed;inset:0;z-index:100;backdrop-filter:blur(4px)}
#pg-search.vis{display:flex}
.sbox{background:var(--sur);border:1px solid var(--bdr);border-radius:18px 18px 0 0;width:100%;max-width:600px;padding:18px 16px;max-height:85vh;overflow-y:auto}
.shandle{width:36px;height:3px;background:var(--bdr);border-radius:2px;margin:0 auto 14px}
.stitle{font-size:15px;font-weight:900;margin-bottom:14px}
.sinp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:10px;padding:11px 13px;outline:none;font-size:14px;-webkit-appearance:none;margin-bottom:12px;transition:border-color .2s}
.sinp:focus{border-color:var(--blue)}
.sinp::placeholder{color:var(--dim)}
.urow{display:flex;align-items:center;gap:11px;padding:12px;border-radius:10px;cursor:pointer;transition:background .1s}
.urow:active{background:var(--sur2)}
.uav{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:white;flex-shrink:0;font-family:"Cairo",sans-serif}

/* ── IMG VIEW ── */
#img-view{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:200;display:none;align-items:center;justify-content:center}
#img-view.open{display:flex}
#iv-img{max-width:96vw;max-height:96vh;border-radius:8px}

/* TOAST */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--blue);color:white;font-family:"Cairo",sans-serif;font-weight:700;font-size:12px;padding:9px 18px;border-radius:24px;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ADMIN */
#pg-admin{flex-direction:column;min-height:100vh;background:#060a0f}
.adm-hdr{background:#0d1117;border-bottom:1px solid #ff6b35;padding:0 16px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:10}
.adm-title{font-size:15px;font-weight:900;color:#ff6b35}
.adm-tabs{display:flex;gap:6px;padding:12px 16px;overflow-x:auto;border-bottom:1px solid var(--bdr);flex-shrink:0}
.adm-tab{white-space:nowrap;padding:7px 14px;border:1px solid var(--bdr);border-radius:20px;font-family:"Cairo",sans-serif;font-size:12px;font-weight:700;cursor:pointer;background:var(--sur);color:var(--mute);transition:all .2s}
.adm-tab.on{background:#ff6b35;color:white;border-color:#ff6b35}
.adm-content{flex:1;overflow-y:auto}
.adm-conv-item{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid rgba(48,54,61,.4);cursor:pointer;transition:background .1s}
.adm-conv-item:active{background:var(--sur2)}
.stat-g{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}

/* PROFILE PAGE */
#pg-profile{flex-direction:column;min-height:100vh}
.prof-cover{background:linear-gradient(135deg,#1d4ed8,#7c3aed);height:120px;position:relative;flex-shrink:0}
.prof-av-wrap{position:absolute;bottom:-36px;right:20px;width:72px;height:72px;border-radius:20px;border:3px solid var(--bg);overflow:hidden;cursor:pointer;background:var(--sur2)}
.prof-av-wrap img{width:100%;height:100%;object-fit:cover}
.prof-av-wrap .av-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:white}
.prof-body{padding:48px 20px 20px;display:flex;flex-direction:column;gap:14px}
.prof-name{font-size:20px;font-weight:900}
.prof-username{font-size:13px;color:var(--blue);margin-top:2px}
.prof-bio{font-size:13px;color:var(--mute);line-height:1.7;margin-top:4px}
.prof-edit-card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px}
.pflbl{font-size:11px;color:var(--mute);font-weight:600;margin-bottom:4px;display:block}
.pfinp{width:100%;background:var(--bg);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:9px;padding:10px 13px;outline:none;font-size:14px;-webkit-appearance:none;transition:border-color .2s}
.pfinp:focus{border-color:var(--blue)}
.pfinp::placeholder{color:var(--dim)}
.save-btn{background:var(--blue);border:none;color:white;font-family:"Cairo",sans-serif;font-weight:900;font-size:14px;cursor:pointer;padding:12px;border-radius:10px;width:100%}

/* VOICE */
.voice-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .2s;flex-shrink:0}
.voice-btn.idle{background:var(--sur2)}
.voice-btn.recording{background:var(--red);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.voice-msg{display:flex;align-items:center;gap:8px;padding:4px 0}
.play-btn{background:rgba(255,255,255,.2);border:none;color:white;cursor:pointer;width:32px;height:32px;border-radius:50%;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.other .play-btn{background:rgba(88,166,255,.2);color:var(--blue)}
.voice-wave{flex:1;height:3px;background:rgba(255,255,255,.3);border-radius:3px}
.other .voice-wave{background:var(--bdr)}
.voice-dur{font-size:10px;opacity:.7}

/* GAME CHALLENGE */
.game-card{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.3);border-radius:12px;padding:14px;margin-top:4px}
.game-title{font-size:13px;font-weight:900;color:#a78bfa;margin-bottom:8px}
.game-desc{font-size:12px;color:var(--mute);margin-bottom:10px;line-height:1.6}
.game-btns{display:flex;gap:8px}
.game-accept{background:linear-gradient(135deg,#7c3aed,#4c1d95);border:none;color:white;font-family:"Cairo",sans-serif;font-weight:700;font-size:12px;cursor:pointer;padding:8px 14px;border-radius:8px;flex:1}
.game-reject{background:var(--sur2);border:1px solid var(--bdr);color:var(--mute);font-family:"Cairo",sans-serif;font-size:12px;cursor:pointer;padding:8px 14px;border-radius:8px}
.game-play-btn{background:linear-gradient(135deg,#7c3aed,#4c1d95);border:none;color:white;font-family:"Cairo",sans-serif;font-weight:700;font-size:12px;cursor:pointer;padding:8px 16px;border-radius:8px;width:100%;margin-top:6px}

/* XO GAME MODAL */
#xo-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:250;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#xo-modal.open{display:flex}
.xo-box{background:var(--sur);border:1px solid rgba(124,58,237,.4);border-radius:20px;padding:24px 20px;width:92%;max-width:380px;text-align:center}
.xo-title{font-size:16px;font-weight:900;color:#a78bfa;margin-bottom:6px}
.xo-status{font-size:13px;color:var(--mute);margin-bottom:18px;min-height:20px}
.xo-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.xo-cell{width:100%;aspect-ratio:1;background:var(--sur2);border:2px solid var(--bdr);border-radius:12px;font-size:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:"Cairo",sans-serif}
.xo-cell:hover:not(.taken){background:rgba(124,58,237,.1);border-color:rgba(124,58,237,.4)}
.xo-cell.taken{cursor:default}
.xo-cell.win{background:rgba(124,58,237,.2);border-color:#7c3aed}
.xo-btns{display:flex;gap:8px}
.xo-restart{flex:1;background:var(--sur2);border:1px solid var(--bdr);color:var(--mute);font-family:"Cairo",sans-serif;font-size:13px;cursor:pointer;padding:10px;border-radius:10px}
.xo-close{flex:1;background:linear-gradient(135deg,#7c3aed,#4c1d95);border:none;color:white;font-family:"Cairo",sans-serif;font-weight:700;font-size:13px;cursor:pointer;padding:10px;border-radius:10px}

/* QUIZ GAME MODAL */
#quiz-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:250;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#quiz-modal.open{display:flex}
.quiz-box{background:var(--sur);border:1px solid rgba(234,179,8,.3);border-radius:20px;padding:24px 20px;width:92%;max-width:400px}
.quiz-title{font-size:15px;font-weight:900;color:#eab308;margin-bottom:16px;text-align:center}
.quiz-q{font-size:14px;font-weight:700;margin-bottom:14px;line-height:1.6;text-align:center}
.quiz-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.quiz-opt{background:var(--sur2);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;font-size:13px;cursor:pointer;padding:11px 14px;border-radius:10px;text-align:right;transition:all .2s}
.quiz-opt:hover{border-color:#eab308;background:rgba(234,179,8,.08)}
.quiz-opt.correct{background:rgba(34,197,94,.15);border-color:#22c55e;color:#22c55e}
.quiz-opt.wrong{background:rgba(239,68,68,.15);border-color:#ef4444;color:#ef4444}
.quiz-score{text-align:center;font-size:13px;color:var(--mute);margin-bottom:12px}
.quiz-next{width:100%;background:linear-gradient(135deg,#eab308,#78350f);border:none;color:white;font-family:"Cairo",sans-serif;font-weight:700;font-size:14px;cursor:pointer;padding:12px;border-radius:10px}
.stat-card{background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:900;color:#ff6b35;display:block;margin-bottom:4px}
.stat-lbl{font-size:12px;color:var(--mute)}
.broadcast-box{margin:16px;background:var(--sur);border:1px solid var(--bdr);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px}
.btxt{width:100%;background:var(--bg);border:1.5px solid var(--bdr);color:var(--txt);font-family:"Cairo",sans-serif;border-radius:9px;padding:11px;outline:none;font-size:13px;resize:none;-webkit-appearance:none;transition:border-color .2s}
.btxt:focus{border-color:#ff6b35}
.bcast-btn{background:#ff6b35;border:none;color:white;font-family:"Cairo",sans-serif;font-weight:900;font-size:14px;cursor:pointer;padding:12px;border-radius:9px;width:100%}
</style>
</head>
<body>

<!-- AUTH -->
<div class="page" id="pg-auth">
  <div class="abox">
    <div class="alogo"><span class="ico">💬</span><div class="tit">محادثات عسل در النجف</div></div>
    <div class="atabs">
      <button class="atb on" onclick="swTab('l')">دخول</button>
      <button class="atb" onclick="swTab('r')">حساب جديد</button>
    </div>
    <div class="fg vis" id="fg-l">
      <div><label class="lbl">البريد الإلكتروني</label><input class="finp" id="l-em" type="email" placeholder="example@email.com" autocomplete="email"></div>
      <div><label class="lbl">كلمة المرور</label><input class="finp" id="l-pw" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <div class="ferr" id="l-err"></div>
      <button class="fbtn" id="l-btn" onclick="doLogin()">دخول</button>
    </div>
    <div class="fg" id="fg-r">
      <div><label class="lbl">الاسم الكامل</label><input class="finp" id="r-nm" type="text" placeholder="اسمك الكامل" autocomplete="name"></div>
      <div><label class="lbl">البريد الإلكتروني</label><input class="finp" id="r-em" type="email" placeholder="example@email.com" autocomplete="email"></div>
      <div><label class="lbl">كلمة المرور</label><input class="finp" id="r-pw" type="password" placeholder="6 أحرف على الأقل" autocomplete="new-password"></div>
      <div><label class="lbl">تأكيد كلمة المرور</label><input class="finp" id="r-pw2" type="password" placeholder="••••••••"></div>
      <div class="ferr" id="r-err"></div>
      <button class="fbtn" id="r-btn" onclick="doReg()">إنشاء حساب</button>
    </div>
  </div>
</div>

<!-- CONV LIST -->
<div class="page" id="pg-list">
  <div class="hdr">
    <div class="hdr-l">
      <div class="av" id="my-av" style="background:#1d4ed8;font-size:16px">؟</div>
      <div class="htitle">💬 المحادثات</div>
    </div>
    <div class="hdr-r">
      <button class="ibtn" onclick="openSearch()" title="محادثة جديدة">✏️</button>
      <button class="ibtn" onclick="openProfile()" title="ملفي الشخصي" style="font-size:16px">👤</button>
      <button class="ibtn" onclick="doLogout()" title="خروج" style="font-size:16px">🚪</button>
    </div>
  </div>
  <div class="clist" id="clist"></div>
  <button class="fab" onclick="openSearch()">✏</button>
</div>

<!-- CHAT ROOM -->
<div class="page" id="pg-chat">
  <div class="chat-hdr">
    <button class="back-btn" onclick="goBack()">‹</button>
    <div class="av" id="ch-av" style="background:#7c3aed">؟</div>
    <div>
      <div class="htitle" id="ch-name">—</div>
      <div style="font-size:11px;color:var(--grn)">نشط</div>
    </div>
  </div>
  <div class="msgs-area" id="msgs-area"></div>
  <div class="inp-area">
    <button class="abtn" onclick="document.getElementById('finp').click()">📎</button>
    <input type="file" id="finp" accept="image/*" style="display:none" onchange="handleFile(this)">
    <button class="abtn" onclick="openGameChallenge()" title="تحدي">🎮</button>
    <textarea class="minp" id="minp" placeholder="اكتب رسالة..." rows="1" onkeydown="onKey(event)"></textarea>
    <button class="voice-btn idle" id="voice-btn" title="رسالة صوتية"
      ontouchstart="startRecord(event)" ontouchend="stopRecord(event)"
      onmousedown="startRecord(event)" onmouseup="stopRecord(event)">🎤</button>
    <button class="sbtn" onclick="sendMsg()">➤</button>
  </div>
  <!-- Game Modal -->

<script>
var SB=supabase.createClient("https://kffnbyevvrozemloovvy.supabase.co","sb_publishable_M8qhgvBV_3lSdc3L8lv4Eg_C9kO3e62");
var CU=null,CONV=null,MSGS=[],CONVS=[],PROFS=[],MCH=null,PF=null;

function G(id){return document.getElementById(id);}
function clr(id){var e=G(id);if(e)e.innerHTML="";}
function showPage(pg){
  ["pg-auth","pg-list","pg-chat"].forEach(function(p){G(p).classList.remove("vis");});
  G("pg-search").classList.remove("vis");
  G(pg).classList.add("vis");
}
function T(msg){var t=G("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
function Err(id,msg){var e=G(id);e.textContent=msg;e.style.display="block";setTimeout(function(){e.style.display="none";},4000);}
function col(id){var c=["#1d4ed8","#7c3aed","#db2777","#059669","#d97706","#dc2626","#0284c7"];return id?c[id.charCodeAt(0)%c.length]:c[0];}
function ft(ts){
  if(!ts)return "";
  var d=new Date(ts),n=new Date(),df=Math.floor((n-d)/1000);
  if(df<60)return "الآن";
  if(df<3600)return Math.floor(df/60)+" د";
  if(d.toDateString()===n.toDateString())return d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
  return d.getDate()+"/"+(d.getMonth()+1);
}
function es(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── TABS ──
function swTab(t){
  G("fg-l").classList.toggle("vis",t==="l");
  G("fg-r").classList.toggle("vis",t==="r");
  document.querySelectorAll(".atb").forEach(function(b,i){b.classList.toggle("on",i===(t==="l"?0:1));});
}

// ── LOGIN ──
function doLogin(){
  var em=G("l-em").value.trim(),pw=G("l-pw").value;
  if(!em||!pw){Err("l-err","يرجى ملء الحقول");return;}
  G("l-btn").disabled=true;G("l-btn").textContent="جاري التحقق...";
  SB.auth.signInWithPassword({email:em,password:pw}).then(function(r){
    G("l-btn").disabled=false;G("l-btn").textContent="دخول";
    if(r.error){Err("l-err","خطأ: "+r.error.message);return;}
    CU=r.data.user;launch();
  }).catch(function(e){
    G("l-btn").disabled=false;G("l-btn").textContent="دخول";
    Err("l-err","خطأ في الاتصال");
  });
}

// ── REGISTER ──
function doReg(){
  var nm=G("r-nm").value.trim(),em=G("r-em").value.trim(),pw=G("r-pw").value,pw2=G("r-pw2").value;
  if(!nm||!em||!pw||!pw2){Err("r-err","يرجى ملء جميع الحقول");return;}
  if(pw!==pw2){Err("r-err","كلمتا المرور غير متطابقتين");return;}
  if(pw.length<6){Err("r-err","كلمة المرور 6 أحرف على الأقل");return;}
  G("r-btn").disabled=true;G("r-btn").textContent="جاري الإنشاء...";
  SB.auth.signUp({email:em,password:pw,options:{data:{full_name:nm}}}).then(function(r){
    G("r-btn").disabled=false;G("r-btn").textContent="إنشاء حساب";
    if(r.error){Err("r-err",r.error.message);return;}
    CU=r.data.user;
    SB.from("profiles").upsert({id:CU.id,full_name:nm,email:em}).then(function(){launch();});
  }).catch(function(){G("r-btn").disabled=false;G("r-btn").textContent="إنشاء حساب";Err("r-err","حدث خطأ");});
}

// ── LOGOUT ──
function doLogout(){
  if(!confirm("تسجيل الخروج؟"))return;
  if(MCH)SB.removeChannel(MCH);
  CU=null;CONV=null;CONVS=[];PROFS=[];
  SB.auth.signOut().then(function(){showPage("pg-auth");});
}

// ── LAUNCH ──
function launch(){
  if(!CU)return;
  var meta=CU.user_metadata||{};
  var nm=(meta.full_name||CU.email||"م")[0].toUpperCase();
  G("my-av").textContent=nm;
  G("my-av").style.background=col(CU.id);
  showPage("pg-list");
  SB.from("profiles").select("id,full_name,email").then(function(r){PROFS=r.data||[];});
  loadConvs();
}

// ── PROFILES ──
function getP(id){
  for(var i=0;i<PROFS.length;i++){if(PROFS[i].id===id)return PROFS[i];}
  return {full_name:"مستخدم",email:""};
}

// ── CONVS ──
function loadConvs(){
  SB.from("conversations").select("*").or("user1_id.eq."+CU.id+",user2_id.eq."+CU.id).order("last_message_at",{ascending:false}).then(function(r){
    CONVS=r.data||[];renderConvs();
  });
}
function renderConvs(){
  var el=G("clist"),html="";
  if(!CONVS.length){el.innerHTML='<div class="empty"><div class="ei">💬</div><div>لا توجد محادثات بعد<br><small>اضغط ✏️ لبدء محادثة جديدة</small></div></div>';return;}
  for(var i=0;i<CONVS.length;i++){
    var c=CONVS[i];
    var oid=c.user1_id===CU.id?c.user2_id:c.user1_id;
    var p=getP(oid);var nm=p.full_name||p.email||"مستخدم";
    html+='<div class="citem" data-i="'+i+'"><div class="cav" style="background:'+col(oid)+'">'+nm[0].toUpperCase()+'</div>'
      +'<div class="cinfo"><div class="cname">'+es(nm)+'</div>'
      +'<div class="clast">'+es(c.last_message||c.last_msg||"ابدأ المحادثة...")+'</div></div>'
      +'<div class="ctime">'+ft(c.last_message_at)+'</div></div>';
  }
  el.innerHTML=html;
  el.querySelectorAll(".citem").forEach(function(item){
    item.addEventListener("click",function(){openChat(CONVS[parseInt(item.dataset.i)]);});
  });
}

// ── CHAT ──
function openChat(conv){
  CONV=conv;
  var oid=conv.user1_id===CU.id?conv.user2_id:conv.user1_id;
  var p=getP(oid);var nm=p.full_name||p.email||"مستخدم";
  G("ch-name").textContent=nm;
  G("ch-av").textContent=nm[0].toUpperCase();
  G("ch-av").style.background=col(oid);
  showPage("pg-chat");
  loadMsgs(conv.id);
  subChat(conv.id);
}
function goBack(){
  if(MCH){SB.removeChannel(MCH);MCH=null;}
  if(window._pollTimer){clearInterval(window._pollTimer);window._pollTimer=null;}
  CONV=null;showPage("pg-list");loadConvs();
}

// ── MSGS ──
function loadMsgs(cid){
  G("msgs-area").innerHTML='<div class="empty"><div class="ei" style="font-size:32px">⏳</div></div>';
  SB.from("messages").select("*").eq("conversation_id",cid).order("created_at",{ascending:true}).then(function(r){
    MSGS=r.data||[];renderMsgs();scrollD();
  });
}
function renderMsgs(){
  var el=G("msgs-area"),html="",ld="";
  if(!MSGS.length){el.innerHTML='<div class="empty"><div class="ei">💬</div><div>لا رسائل بعد — قل مرحباً! 👋</div></div>';return;}
  for(var i=0;i<MSGS.length;i++){
    var m=MSGS[i],me=m.sender_id===CU.id;
    var p=getP(m.sender_id);var pnm=(p.full_name||"م")[0].toUpperCase();
    var d=new Date(m.created_at),ds=d.getDate()+"/"+(d.getMonth()+1)+"/"+d.getFullYear();
    if(ds!==ld){html+='<div class="dsep">'+ds+'</div>';ld=ds;}
    var tm=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
    var body="";
    var mtype=m.msg_type||"text";
    var mFileUrl=m.file_url||null;
    var mExtra=m.extra||{};
    var mcontent=m.content||m.topic||"";
    if(mtype==="voice"&&mFileUrl){
      body+='<div class="voice-msg"><button class="play-btn vplay" data-url="'+es(mFileUrl)+'">▶</button><div class="voice-wave"></div><span class="voice-dur">'+(mExtra.dur?mExtra.dur+"ث":"")+'</span></div>';
    } else if(mtype==="game"||mtype==="xo"){
      var ex=mExtra||m.extra||{};
      var typeNames={"quiz":"❓ أسئلة وأجوبة","xo":"⭕ لعبة XO","dare":"🎯 جرأة أو حقيقة","custom":"✏️ تحدي مخصص"};
      if(ex.type==="xo-started"){
        // Game already started - show join button for both
        var cid=ex.challenger_id,aid=ex.accepter_id;
        body+='<div class="game-card">'
          +'<div class="game-title">⭕ جلسة XO نشطة!</div>'
          +'<div class="game-desc">'+es(ex.desc||"اللعبة جاهزة! اضغط للانضمام")+'</div>'
          +'<button class="game-play-btn gxo" data-cid="'+cid+'" data-aid="'+aid+'">🎮 العب الآن</button>'
          +'</div>';
      } else {
        var st=ex.status||"pending";
        body+='<div class="game-card"><div class="game-title">🎮 '+( typeNames[ex.type]||"تحدي")+'</div>'
          +'<div class="game-desc">'+es(ex.desc||"")+'</div>'
          +(st==="accepted"?'<div style="font-size:11px;color:#22c55e;font-weight:700">✅ تم القبول</div>'
            :st==="rejected"?'<div style="font-size:11px;color:#ef4444;font-weight:700">❌ تم الرفض</div>'
            :me?'<div style="font-size:11px;color:var(--mute)">⏳ في انتظار الرد...</div>'
            :'<div class="game-btns"><button class="game-accept gacc" data-mid="'+m.id+'">✅ قبول</button><button class="game-reject grej" data-mid="'+m.id+'">❌ رفض</button></div>')
          +'</div>';
      }
    } else {
      if(m.file_url){
        if(mFileUrl&&m.file_type&&m.file_type.indexOf("image")!==-1){
          body+='<img class="mimg" src="'+es(mFileUrl)+'" onclick="openImg(this.src)" loading="lazy">';
        }else{
          body+='<a href="'+es(mFileUrl)+'" target="_blank" style="color:'+(me?"#fff":"var(--blue)")+';font-size:12px">📎 ملف</a>';
        }
      }
      if(mcontent)body+='<div class="mtxt">'+es(mcontent)+'</div>';
    }
    html+='<div class="mrow '+(me?"me":"other")+'">'
      +(me?"":'<div class="mav" style="background:'+col(m.sender_id)+'">'+pnm+'</div>')
      +'<div class="bbl">'+body+'<div class="mtime">'+tm+(me?" · "+(m.is_read?"✓✓":"✓"):"")+'</div></div>'
      +(me?'<div class="mav" style="background:'+col(m.sender_id)+'">'+pnm+'</div>':"")
      +'</div>';
  }
  el.innerHTML=html;
  // Add game button events
  el.querySelectorAll(".gxo").forEach(function(btn){
    btn.addEventListener("click",function(){
      var cid=btn.getAttribute("data-cid");
      openXO(cid);
    });
  });
  el.querySelectorAll(".gacc").forEach(function(btn){
    btn.addEventListener("click",function(){
      var mid=btn.getAttribute("data-mid");
      acceptGame(mid);
    });
  });
  el.querySelectorAll(".grej").forEach(function(btn){
    btn.addEventListener("click",function(){
      var mid=btn.getAttribute("data-mid");
      rejectGame(mid);
    });
  });
  // Add voice play events
  el.querySelectorAll(".vplay").forEach(function(btn){
    btn.addEventListener("click",function(){
      playVoice(btn.getAttribute("data-url"),btn);
    });
  });
}
function scrollD(){var el=G("msgs-area");if(el){el.scrollTop=el.scrollHeight;}}
function subChat(cid){
  if(MCH)SB.removeChannel(MCH);
  MCH=SB.channel("mc"+cid).on("postgres_changes",{event:"INSERT",schema:"public",table:"messages",filter:"conversation_id=eq."+cid},function(p){
    var m=p.new;
    if(!m)return;
    var found=false;
    for(var i=0;i<MSGS.length;i++){if(MSGS[i].id===m.id){found=true;break;}}
    if(!found){MSGS.push(m);renderMsgs();scrollD();}
  }).subscribe();
  // Poll every 3 seconds as fallback
  if(window._pollTimer)clearInterval(window._pollTimer);
  window._pollTimer=setInterval(function(){
    if(!CONV||CONV.id!==cid){clearInterval(window._pollTimer);return;}
    SB.from("messages").select("*").eq("conversation_id",cid).order("created_at",{ascending:true}).then(function(r){
      if(r.data&&r.data.length!==MSGS.length){MSGS=r.data;renderMsgs();scrollD();}
    });
  },3000);
}

// ── SEND ──
function sendMsg(){
  var text=G("minp").value.trim();
  if(!text&&!PF)return;
  if(!CONV)return;
  var data={conversation_id:CONV.id,sender_id:CU.id,content:text||null};
  G("minp").value="";G("minp").style.height="auto";
  if(PF){
    var file=PF;PF=null;G("finp").value="";
    var ext=(file.name.split(".").pop()||"jpg");
    var path="chat/"+CU.id+"_"+Date.now()+"."+ext;
    SB.storage.from("products").upload(path,file,{upsert:true,contentType:file.type}).then(function(r){
      if(!r.error){
        data.file_url=SB.storage.from("products").getPublicUrl(path).data.publicUrl;
        data.file_type=file.type;data.file_name=file.name;
      }
      insertMsg(data);
    });
  }else{insertMsg(data);}
}
function insertMsg(data){
  // Clean data - remove undefined/null file fields if not needed
  var insertData={
    conversation_id:data.conversation_id,
    sender_id:data.sender_id,
    content:data.content||data.topic||null,
    msg_type:data.msg_type||"text",
    is_read:false
  };
  if(data.file_url)insertData.file_url=data.file_url;
  if(data.file_type)insertData.file_type=data.file_type;

// ── VOICE ──
var mediaRec=null,audioChunks=[],recStart=0,recTimer=null;
function startRecord(e){
  e.preventDefault();
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    T("المتصفح لا يدعم التسجيل الصوتي");return;
  }
  if(!CONV){T("افتح محادثة أولاً");return;}
  // Request mic permission explicitly
  navigator.mediaDevices.getUserMedia({audio:true,video:false}).then(function(stream){
    audioChunks=[];recStart=Date.now();
    // Try webm first, fallback to ogg or mp4
    var mimeType="audio/webm";
    if(!MediaRecorder.isTypeSupported("audio/webm")){
      if(MediaRecorder.isTypeSupported("audio/ogg"))mimeType="audio/ogg";
      else if(MediaRecorder.isTypeSupported("audio/mp4"))mimeType="audio/mp4";
      else mimeType="";
    }
    var opts=mimeType?{mimeType:mimeType}:{};
    try{mediaRec=new MediaRecorder(stream,opts);}
    catch(err){mediaRec=new MediaRecorder(stream);}
    mediaRec.ondataavailable=function(ev){if(ev.data&&ev.data.size>0)audioChunks.push(ev.data);};
    mediaRec.onstop=function(){
      var type=mediaRec.mimeType||"audio/webm";
      var blob=new Blob(audioChunks,{type:type});
      var dur=Math.round((Date.now()-recStart)/1000);
      if(dur<1){T("التسجيل قصير جداً");stream.getTracks().forEach(function(t){t.stop();});return;}
      uploadVoice(blob,dur,type);
      stream.getTracks().forEach(function(t){t.stop();});
    };
    mediaRec.start(100);
    G("voice-btn").classList.remove("idle");G("voice-btn").classList.add("recording");
    G("voice-btn").textContent="⏹";
    T("🎤 جاري التسجيل... ارفع إصبعك للإرسال");
    recTimer=setInterval(function(){
      var s=Math.round((Date.now()-recStart)/1000);
      G("voice-btn").title=s+"ث";
      if(s>=60)stopRecord({preventDefault:function(){}});
    },1000);
  }).catch(function(err){
    var msg="لا يمكن الوصول للميكروفون";
    if(err.name==="NotAllowedError")msg="يرجى السماح بالوصول للميكروفون من إعدادات المتصفح";
    else if(err.name==="NotFoundError")msg="لم يتم العثور على ميكروفون";
    T(msg);
  });
}
function stopRecord(e){
  e.preventDefault();
  if(recTimer){clearInterval(recTimer);recTimer=null;}
  if(mediaRec&&mediaRec.state==="recording"){mediaRec.stop();}
  G("voice-btn").classList.remove("recording");G("voice-btn").classList.add("idle");G("voice-btn").textContent="🎤";
}
function uploadVoice(blob,dur,mimeType){
  if(!CONV)return;
  var ext="webm";
  if(mimeType&&mimeType.indexOf("ogg")!==-1)ext="ogg";
  else if(mimeType&&mimeType.indexOf("mp4")!==-1)ext="mp4";
  var path="voices/"+CU.id+"_"+Date.now()+"."+ext;
  var ct=mimeType||"audio/webm";
  T("⏳ جاري الإرسال...");
  SB.storage.from("voices").upload(path,blob,{upsert:true,contentType:ct}).then(function(r){
    if(r.error){T("فشل رفع الصوت: "+r.error.message);return;}
    var url=SB.storage.from("voices").getPublicUrl(path).data.publicUrl;
    insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"🎤 رسالة صوتية",msg_type:"voice",file_url:url,extra:{dur:dur}});
  });
}
var curAudio=null;
function playVoice(url,btn){
  if(curAudio){curAudio.pause();curAudio=null;
    document.querySelectorAll(".play-btn").forEach(function(b){b.textContent="▶";});
  }
  curAudio=new Audio(url);
  btn.textContent="⏸";
  curAudio.play();
  curAudio.onended=function(){btn.textContent="▶";curAudio=null;};
}

// ── GAME CHALLENGE ──
function openGameChallenge(){
  if(!CONV){T("افتح محادثة أولاً");return;}
  G("game-modal").style.display="flex";
  G("game-desc").value="";
}
function closeGameModal(){G("game-modal").style.display="none";}
function sendGameChallenge(){
  var type=G("game-type").value;
  var desc=G("game-desc").value.trim();
  if(!desc){T("يرجى وصف التحدي");return;}
  var typeNames={"quiz":"أسئلة وأجوبة","xo":"لعبة XO","dare":"جرأة أو حقيقة","custom":"تحدي مخصص"};
  insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"🎮 تحدي: "+typeNames[type],msg_type:"game",extra:{type:type,desc:desc,status:"pending"}});
  closeGameModal();
}
function acceptGame(msgId){
  SB.from("messages").select("extra,sender_id").eq("id",msgId).single().then(function(r){
    if(r.error){T("خطأ في جلب بيانات التحدي");return;}
    var ex=r.data.extra||{};
    var gameType=ex.type||"custom";
    ex.status="accepted";ex.accepted_by=CU.id;
    SB.from("messages").update({extra:ex}).eq("id",msgId).then(function(ur){
      if(ur.error){T("خطأ: "+ur.error.message);return;}
      if(CONV)insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"✅ قبلت التحدي! لنبدأ اللعب 🎮",msg_type:"text"});
      if(CONV)loadMsgs(CONV.id);
      // Send game-start message so BOTH players can join
      var challengerId=r.data.sender_id;
      if(CONV&&gameType==="xo"){
        insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"🎮 بدأت اللعبة! اضغط 'العب XO' للانضمام",msg_type:"game",extra:{type:"xo-started",challenger_id:challengerId,accepter_id:CU.id,desc:"اللعبة بدأت! كلا اللاعبين يلعبان معاً"}});
      }
      // Open the game
      setTimeout(function(){
        if(gameType==="xo")openXO(challengerId);
        else if(gameType==="quiz")openQuiz();
        else if(gameType==="dare"){insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"🎯 قبلت تحدي الجرأة! "+ex.desc,msg_type:"text"});}
        else{T("✅ تم قبول التحدي! "+ex.desc);}
      },500);
    });
  });
}
function rejectGame(msgId){
  SB.from("messages").select("extra").eq("id",msgId).single().then(function(r){
    var ex=r.data&&r.data.extra?r.data.extra:{};
    ex.status="rejected";
    SB.from("messages").update({extra:ex}).eq("id",msgId).then(function(ur){
      if(ur.error){T("خطأ: "+ur.error.message);return;}
      T("❌ رفضت التحدي");
      if(CONV)insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"❌ رفضت التحدي",msg_type:"text"});
      if(CONV)loadMsgs(CONV.id);
    });
  });
}

// ── XO GAME (REALTIME 2-PLAYER) ──
var xoSession=null,xoSub=null,xoMySymbol="",xoGameOver=false;

function openXO(challengerId){
  // Determine my symbol
  xoMySymbol=CU.id===challengerId?"X":"O";
  var myDisp=xoMySymbol==="X"?"❌":"⭕";
  var opDisp=xoMySymbol==="X"?"⭕":"❌";
  document.getElementById("xo-my-sym").textContent=myDisp;
  document.getElementById("xo-op-sym").textContent=opDisp;
  document.getElementById("xo-status").textContent=xoMySymbol==="X"?"دورك أنت "+myDisp:"دور المنافس ⏳";
  xoGameOver=false;

  // Find or create game session
  if(!CONV)return;
  var p1=challengerId,p2=CU.id===challengerId?null:CU.id;

  SB.from("game_sessions")
    .select("*")
    .eq("conversation_id",CONV.id)
    .eq("game_type","xo")
    .in("status",["waiting","playing"])
    .order("created_at",{ascending:false})
    .limit(1)
    .then(function(r){
      if(r.data&&r.data.length>0){
        xoSession=r.data[0];
        // Join existing session
        if(xoSession.status==="waiting"&&xoSession.player1_id!==CU.id){
          SB.from("game_sessions").update({player2_id:CU.id,status:"playing"}).eq("id",xoSession.id).then(function(){
            loadXOSession(xoSession.id);
          });
        }else{
          loadXOSession(xoSession.id);
        }
      }else{
        // Create new session
        SB.from("game_sessions").insert([{
          conversation_id:CONV.id,
          game_type:"xo",
          player1_id:CU.id,
          player2_id:CU.id,
          board:["","","","","","","","",""],
          current_turn:CU.id,
          status:"waiting"
        }]).select().single().then(function(r2){
          if(r2.data){xoSession=r2.data;loadXOSession(r2.data.id);}
        });
      }
    });
  document.getElementById("xo-modal").classList.add("open");
}

function loadXOSession(sessionId){
  SB.from("game_sessions").select("*").eq("id",sessionId).single().then(function(r){
    if(r.data){xoSession=r.data;renderXO();}
  });
  // Subscribe to changes
  if(xoSub)SB.removeChannel(xoSub);
  xoSub=SB.channel("xo-"+sessionId)
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"game_sessions",filter:"id=eq."+sessionId},function(p){
      xoSession=p.new;renderXO();
      if(p.new.status==="finished"){
        xoGameOver=true;
        var st=document.getElementById("xo-status");
        if(p.new.winner===CU.id)st.textContent="🏆 أنت الفائز!";
        else if(p.new.winner==="draw")st.textContent="🤝 تعادل!";
        else st.textContent="😔 خسرت!";
      }
    }).subscribe();
}

function renderXO(){
  if(!xoSession)return;
  var board=xoSession.board||["","","","","","","","",""];
  var isMyTurn=xoSession.current_turn===CU.id;
  var st=document.getElementById("xo-status");
  if(!xoGameOver){
    if(xoSession.status==="waiting")st.textContent="⏳ في انتظار المنافس...";
    else if(isMyTurn)st.textContent="دورك أنت "+(xoMySymbol==="X"?"❌":"⭕");
    else st.textContent="دور المنافس ⏳";
  }
  var boardEl=document.getElementById("xo-board");
  boardEl.innerHTML="";
  for(var i=0;i<9;i++){
    var cell=document.createElement("button");
    cell.className="xo-cell"+(board[i]?" taken":"");
    cell.textContent=board[i]==="X"?"❌":board[i]==="O"?"⭕":"";
    if(!board[i]&&!xoGameOver&&isMyTurn&&xoSession.status==="playing"){
      (function(idx){cell.addEventListener("click",function(){playXO(idx);});})(i);
    }
    boardEl.appendChild(cell);
  }
  // Highlight win
  if(xoSession.winner&&xoSession.winner!=="draw"){
    var lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    var cells=boardEl.querySelectorAll(".xo-cell");
    var winSym=xoSession.player1_id===xoSession.winner?"X":"O";
    lines.forEach(function(l){
      if(board[l[0]]===winSym&&board[l[1]]===winSym&&board[l[2]]===winSym){
        cells[l[0]].classList.add("win");cells[l[1]].classList.add("win");cells[l[2]].classList.add("win");
      }
    });
  }
}

function playXO(idx){
  if(!xoSession||xoSession.status!=="playing")return;
  if(xoSession.current_turn!==CU.id)return;
  var board=xoSession.board.slice();
  if(board[idx])return;
  board[idx]=xoMySymbol;
  // Check winner
  var winner=checkXOWin(board);
  var isDraw=!winner&&board.every(function(c){return c;});
  var otherPlayer=xoSession.player1_id===CU.id?xoSession.player2_id:xoSession.player1_id;
  var updates={
    board:board,
    current_turn:otherPlayer,
    updated_at:new Date().toISOString()
  };
  if(winner){updates.status="finished";updates.winner=CU.id;xoGameOver=true;}
  else if(isDraw){updates.status="finished";updates.winner="draw";xoGameOver=true;}
  SB.from("game_sessions").update(updates).eq("id",xoSession.id).then(function(){
    if(winner){
      T("🏆 أنت الفائز!");
      if(CONV)insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"🏆 فزت في لعبة XO!"});
    }else if(isDraw){
      T("🤝 تعادل!");
      if(CONV)insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"🤝 تعادل في XO!"});
    }
  });
}
function checkXOWin(b){
  var lines=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(var i=0;i<lines.length;i++){
    var a=lines[i][0],bx=lines[i][1],c=lines[i][2];
    if(b[a]&&b[a]===b[bx]&&b[a]===b[c])return b[a];
  }return null;
}
function restartXO(){
  if(!xoSession)return;
  SB.from("game_sessions").update({
    board:["","","","","","","","",""],
    current_turn:xoSession.player1_id,
    status:"playing",winner:null,updated_at:new Date().toISOString()
  }).eq("id",xoSession.id).then(function(){xoGameOver=false;});
}
function closeXO(){
  if(xoSub){SB.removeChannel(xoSub);xoSub=null;}
  document.getElementById("xo-modal").classList.remove("open");
}

// ── QUIZ GAME (Islamic Questions) ──
var QUIZZES=[
  {q:"ما عدد سور القرآن الكريم؟",opts:["112","113","114","115"],ans:2},
  {q:"ما اسم أطول سورة في القرآن؟",opts:["آل عمران","النساء","البقرة","المائدة"],ans:2},
  {q:"ما اسم أقصر سورة في القرآن؟",opts:["الإخلاص","الكوثر","الفلق","الناس"],ans:1},
  {q:"كم عدد أجزاء القرآن الكريم؟",opts:["28","29","30","31"],ans:2},
  {q:"في أي شهر نزل القرآن؟",opts:["رجب","شعبان","رمضان","محرم"],ans:2},
  {q:"ما اسم أول سورة نزلت؟",opts:["الفاتحة","المدثر","العلق","المزمل"],ans:2},
  {q:"كم عدد آيات سورة الفاتحة؟",opts:["5","6","7","8"],ans:2},
  {q:"ما معنى كلمة القرآن؟",opts:["الكتاب","المقروء","الحكمة","النور"],ans:1},
  {q:"من هو النبي الأول؟",opts:["إدريس","نوح","آدم","إبراهيم"],ans:2},
  {q:"كم عدد أركان الإسلام؟",opts:["4","5","6","7"],ans:1},
  {q:"ما عدد أنبياء الإسلام المذكورين في القرآن؟",opts:["23","24","25","26"],ans:2},
  {q:"ما اسم جبل نزل عليه الوحي؟",opts:["ثور","عرفات","النور","أحد"],ans:2},
  {q:"ما اسم والد النبي محمد ﷺ؟",opts:["عبدالله","عبدالمطلب","أبو طالب","حمزة"],ans:0},
  {q:"في أي مدينة وُلد النبي محمد ﷺ؟",opts:["المدينة","مكة","الطائف","جدة"],ans:1},
  {q:"كم سنة استغرق نزول القرآن؟",opts:["20","23","25","30"],ans:1},
];
var quizIdx=0,quizScore=0,quizAnswered=false,quizQuestions=[];
function openQuiz(){
  quizQuestions=QUIZZES.slice().sort(function(){return Math.random()-.5;}).slice(0,8);
  quizIdx=0;quizScore=0;quizAnswered=false;
  renderQuiz();
  document.getElementById("quiz-modal").classList.add("open");
}
function renderQuiz(){
  var q=quizQuestions[quizIdx];
  quizAnswered=false;
  document.getElementById("quiz-score").textContent="السؤال "+(quizIdx+1)+"/"+quizQuestions.length+" · النتيجة: "+quizScore;
  document.getElementById("quiz-q").textContent=q.q;
  document.getElementById("quiz-next").style.display="none";
  var optsEl=document.getElementById("quiz-opts");
  optsEl.innerHTML="";
  q.opts.forEach(function(opt,i){
    var btn=document.createElement("button");
    btn.className="quiz-opt";btn.textContent=opt;
    (function(idx){btn.addEventListener("click",function(){answerQuiz(idx);});})(i);
    optsEl.appendChild(btn);
  });
}
function answerQuiz(picked){
  if(quizAnswered)return;
  quizAnswered=true;
  var q=quizQuestions[quizIdx];
  var opts=document.getElementById("quiz-opts").querySelectorAll(".quiz-opt");
  opts[picked].classList.add(picked===q.ans?"correct":"wrong");
  if(picked!==q.ans)opts[q.ans].classList.add("correct");
  if(picked===q.ans){quizScore++;T("✅ إجابة صحيحة!");}
  else T("❌ إجابة خاطئة!");
  quizIdx++;
  document.getElementById("quiz-score").textContent="السؤال "+quizIdx+"/"+quizQuestions.length+" · النتيجة: "+quizScore;
  document.getElementById("quiz-next").style.display=quizIdx<quizQuestions.length?"block":"none";
  if(quizIdx>=quizQuestions.length){
    document.getElementById("quiz-q").textContent="🎉 انتهت الأسئلة! نتيجتك: "+quizScore+"/"+quizQuestions.length;
    document.getElementById("quiz-opts").innerHTML="";
    if(CONV)insertMsg({conversation_id:CONV.id,sender_id:CU.id,content:"🧠 نتيجتي في تحدي الأسئلة: "+quizScore+"/"+quizQuestions.length+" 🏆"});
  }
}
function nextQuizQ(){renderQuiz();}
function closeQuiz(){document.getElementById("quiz-modal").classList.remove("open");}
